spring:
  application:
    name: wonmally-api

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:wonmally_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:wonmally}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        type:
          preferred_uuid_jdbc_type: CHAR
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM:noreply@wonmally.com}
    test-connection: true
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

wonmally:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_minimum_512_bits_64_chars_secret_key_required!}
      access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}      # 15 minutes
      refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 jours
    rate-limit:
      max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:10}     # tentatives /login par IP
      window-minutes: ${RATE_LIMIT_WINDOW_MINUTES:15} # durée de la fenêtre
 
brevo:
  api-key: ${BREVO_API_KEY:}
  sender-name: ${BREVO_SENDER_NAME:Wonmally}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: wonmally-backend
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: false

logging:
  level:
    root: INFO
    com.wonmally.app: DEBUG
    org.springframework.security: INFO
    org.springframework.mail: DEBUG
    com.sun.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
